name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        working-directory: example
        run: flutter pub get

      - name: Build debug APK
        working-directory: example
        shell: bash
        run: |
          set +e
          flutter build apk --debug 2>&1 | tee ../flutter-build.log
          code=${PIPESTATUS[0]}
          echo "$code" > ../flutter-build-exit-code.txt
          exit "$code"

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: text-router-debug-apk
          path: example/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: text-router-build-log
          path: |
            flutter-build.log
            flutter-build-exit-code.txt
          if-no-files-found: ignore
